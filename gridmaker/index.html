<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Layout Visualizer</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #1e1e1e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .row {
      display: flex;
      gap: 5px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #555;
      border-radius: 4px;
      background-color: #333;
      color: white;
      text-align: center;
      width: 80px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #info {
      font-size: 18px;
      margin-bottom: 20px;
      color: #aaa;
    }
    #grid {
      display: grid;
      gap: 4px;
      margin-bottom: 30px;
    }
    .box {
      width: 40px;
      height: 40px;
      background-color: #333;
      border-radius: 4px;
    }
    .filled {
      background-color: #4CAF50; /* Green for filled slots */
    }
    .remainder-filled {
      background-color: #ff9800; /* Orange for remainders to stand out */
    }
    #remaindersSection {
      display: none; /* Hidden by default */
      text-align: center;
      border-top: 2px dashed #555;
      padding-top: 20px;
      width: 100%;
      max-width: 600px;
    }
    #remaindersSection h3 {
      margin-top: 0;
      color: #ff9800;
    }
    #remaindersGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h2>Layout Visualizer</h2>
  
  <div class="controls">
    <div class="control-group">
      <label>Total Items</label>
      <input type="number" id="itemCount" value="50" min="1" oninput="autoCalculate()">
    </div>
    
    <div class="control-group">
      <label>Grid Size (X by X)</label>
      <div class="row">
        <button onclick="adjustGrid(-1)">-</button>
        <input type="number" id="gridSize" value="8" min="1" oninput="drawGrid()">
        <button onclick="adjustGrid(1)">+</button>
      </div>
    </div>
  </div>

  <div id="info"></div>
  <div id="grid"></div>

  <div id="remaindersSection">
    <h3>Remainders</h3>
    <div id="remaindersGrid"></div>
  </div>

  <script>
    // Automatically find the best starting square when item count changes
    function autoCalculate() {
      const count = parseInt(document.getElementById('itemCount').value) || 0;
      const bestSize = Math.ceil(Math.sqrt(count)) || 1;
      document.getElementById('gridSize').value = bestSize;
      drawGrid();
    }

    // Handle the +/- buttons for grid size
    function adjustGrid(change) {
      const sizeInput = document.getElementById('gridSize');
      let newSize = parseInt(sizeInput.value) + change;
      if (newSize < 1) newSize = 1; // Prevent 0 or negative grid sizes
      sizeInput.value = newSize;
      drawGrid();
    }

    // Draw the grids based on current inputs
    function drawGrid() {
      const count = parseInt(document.getElementById('itemCount').value) || 0;
      const size = parseInt(document.getElementById('gridSize').value) || 1;
      
      const capacity = size * size;
      const grid = document.getElementById('grid');
      const info = document.getElementById('info');
      const remaindersSection = document.getElementById('remaindersSection');
      const remaindersGrid = document.getElementById('remaindersGrid');

      // Set up the main grid layout
      grid.style.gridTemplateColumns = `repeat(${size}, 40px)`;
      grid.innerHTML = ''; 

      // Update info text
      info.innerText = `Grid: ${size}x${size} | Total Capacity: ${capacity}`;

      // Fill the main grid
      const mainBlocksToFill = Math.min(count, capacity);
      for (let i = 0; i < capacity; i++) {
        const box = document.createElement('div');
        box.classList.add('box');
        if (i < mainBlocksToFill) {
          box.classList.add('filled');
        }
        grid.appendChild(box);
      }

      // Handle remainders
      if (count > capacity) {
        remaindersSection.style.display = 'block';
        remaindersGrid.innerHTML = '';
        
        const remainderCount = count - capacity;
        for (let i = 0; i < remainderCount; i++) {
          const box = document.createElement('div');
          box.classList.add('box', 'remainder-filled');
          remaindersGrid.appendChild(box);
        }
      } else {
        remaindersSection.style.display = 'none';
      }
    }

    // Run once on load to show the initial 50 block setup
    window.onload = autoCalculate;
  </script>

</body>
</html>
