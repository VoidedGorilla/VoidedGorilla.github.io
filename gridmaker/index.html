<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Layout Visualizer</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #1e1e1e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }
    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      background-color: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      align-items: center;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .row {
      display: flex;
      gap: 5px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #555;
      border-radius: 4px;
      background-color: #333;
      color: white;
      text-align: center;
      width: 80px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    #centerBtn {
      background-color: #555;
      width: 120px;
    }
    #centerBtn.active {
      background-color: #2196F3; /* Blue when active */
    }
    #centerBtn.active:hover {
      background-color: #1976D2;
    }
    #info {
      font-size: 18px;
      margin-bottom: 20px;
      color: #aaa;
    }
    #grid {
      display: grid;
      gap: 4px;
      margin-bottom: 30px;
    }
    .box {
      width: 40px;
      height: 40px;
      background-color: #333;
      border-radius: 4px;
    }
    .filled {
      background-color: #4CAF50; /* Green */
    }
    .remainder-filled {
      background-color: #ff9800; /* Orange */
    }
    #remaindersSection {
      display: none;
      text-align: center;
      border-top: 2px dashed #555;
      padding-top: 20px;
      width: 100%;
      max-width: 600px;
    }
    #remaindersSection h3 {
      margin-top: 0;
      color: #ff9800;
    }
    #remaindersGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h2>Layout Visualizer</h2>
  
  <div class="controls">
    <div class="control-group">
      <label>Total Items</label>
      <input type="number" id="itemCount" value="50" min="1" oninput="autoCalculate()">
    </div>
    
    <div class="control-group">
      <label>Grid Size (X by X)</label>
      <div class="row">
        <button onclick="adjustGrid(-1)">-</button>
        <input type="number" id="gridSize" value="8" min="1" oninput="drawGrid()">
        <button onclick="adjustGrid(1)">+</button>
      </div>
    </div>

    <div class="control-group">
      <label>Alignment</label>
      <button id="centerBtn" onclick="toggleCenter()">Center: OFF</button>
    </div>
  </div>

  <div id="info"></div>
  <div id="grid"></div>

  <div id="remaindersSection">
    <h3>Remainders</h3>
    <div id="remaindersGrid"></div>
  </div>

  <script>
    let isCentered = false;

    function toggleCenter() {
      isCentered = !isCentered;
      const btn = document.getElementById('centerBtn');
      btn.innerText = isCentered ? 'Center: ON' : 'Center: OFF';
      
      if (isCentered) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
      drawGrid();
    }

    function autoCalculate() {
      const count = parseInt(document.getElementById('itemCount').value) || 0;
      const bestSize = Math.ceil(Math.sqrt(count)) || 1;
      document.getElementById('gridSize').value = bestSize;
      drawGrid();
    }

    function adjustGrid(change) {
      const sizeInput = document.getElementById('gridSize');
      let newSize = parseInt(sizeInput.value) + change;
      if (newSize < 1) newSize = 1;
      sizeInput.value = newSize;
      drawGrid();
    }

    function drawGrid() {
      const count = parseInt(document.getElementById('itemCount').value) || 0;
      const size = parseInt(document.getElementById('gridSize').value) || 1;
      
      const capacity = size * size;
      const grid = document.getElementById('grid');
      const info = document.getElementById('info');
      const remaindersSection = document.getElementById('remaindersSection');
      const remaindersGrid = document.getElementById('remaindersGrid');

      grid.style.gridTemplateColumns = `repeat(${size}, 40px)`;
      grid.innerHTML = ''; 

      info.innerText = `Grid: ${size}x${size} | Total Capacity: ${capacity}`;

      const mainBlocksToFill = Math.min(count, capacity);
      const gridArray = new Array(capacity).fill(false);

      if (isCentered) {
        // Calculate the optimal square shape for the items
        const innerW = Math.ceil(Math.sqrt(mainBlocksToFill));
        const innerH = Math.ceil(mainBlocksToFill / innerW);
        
        // Find offsets to center that shape in the main grid
        const startX = Math.max(0, Math.floor((size - innerW) / 2));
        const startY = Math.max(0, Math.floor((size - innerH) / 2));

        let placed = 0;
        for (let r = 0; r < innerH; r++) {
          for (let c = 0; c < innerW; c++) {
            if (placed < mainBlocksToFill) {
              const gridR = startY + r;
              const gridC = startX + c;
              if (gridR < size && gridC < size) {
                gridArray[gridR * size + gridC] = true;
              }
              placed++;
            }
          }
        }
      } else {
        // Default top-left fill
        for (let i = 0; i < mainBlocksToFill; i++) {
          gridArray[i] = true;
        }
      }

      // Render the grid boxes
      for (let i = 0; i < capacity; i++) {
        const box = document.createElement('div');
        box.classList.add('box');
        if (gridArray[i]) {
          box.classList.add('filled');
        }
        grid.appendChild(box);
      }

      // Handle remainders
      if (count > capacity) {
        remaindersSection.style.display = 'block';
        remaindersGrid.innerHTML = '';
        
        const remainderCount = count - capacity;
        for (let i = 0; i < remainderCount; i++) {
          const box = document.createElement('div');
          box.classList.add('box', 'remainder-filled');
          remaindersGrid.appendChild(box);
        }
      } else {
        remaindersSection.style.display = 'none';
      }
    }

    window.onload = autoCalculate;
  </script>

</body>
</html>
