<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: monospace;
      display: flex;
      gap: 20px;
      padding: 20px;
      margin: 0;
      height: 100vh;
      box-sizing: border-box;
    }
    textarea {
      width: 50%;
      background: #000;
      color: #aaa;
      border: 1px solid #333;
      padding: 10px;
      font-family: monospace;
      resize: none;
    }
    #viewer {
      width: 50%;
      display: flex;
      flex-direction: column;
    }
    .controls {
      background: #222;
      padding: 10px;
      border: 1px solid #333;
      margin-bottom: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, select, input {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 5px 10px;
      font-family: monospace;
    }
    button {
      cursor: pointer;
    }
    button:hover {
      background: #444;
    }
    #output {
      background: #000;
      padding: 10px;
      white-space: pre-wrap;
      border: 1px solid #333;
      flex-grow: 1;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <textarea id="input" oninput="handleTyping()"></textarea>
  
  <div id="viewer">
    <div class="controls">
      <label>Mode: 
        <select id="mode" onchange="updateMode()">
          <option value="typewriter">Typewriter</option>
          <option value="instant">Instant</option>
        </select>
      </label>

      <label id="animStyleContainer">Style: 
        <select id="animStyle">
          <option value="char">Character</option>
          <option value="line">Line</option>
        </select>
      </label>
      
      <label id="delayContainer">Delay: 
        <input type="number" id="delay" value="20" min="1" style="width: 60px;"> ms
      </label>
      
      <button id="playBtn" onclick="playAnim()">Play Animation</button>
    </div>
    <div id="output"></div>
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const modeSelect = document.getElementById('mode');
    const animStyleSelect = document.getElementById('animStyle');
    const animStyleContainer = document.getElementById('animStyleContainer');
    const delayContainer = document.getElementById('delayContainer');
    const delayInput = document.getElementById('delay');
    const playBtn = document.getElementById('playBtn');
    let timer;

    const colors = {
      'black':'#000000', 'dark_blue':'#0000AA', 'dark_green':'#00AA00', 'dark_aqua':'#00AAAA',
      'dark_red':'#AA0000', 'dark_purple':'#AA00AA', 'gold':'#FFAA00', 'gray':'#AAAAAA',
      'dark_gray':'#555555', 'blue':'#5555FF', 'green':'#55FF55', 'aqua':'#55FFFF',
      'red':'#FF5555', 'light_purple':'#FF55FF', 'yellow':'#FFFF55', 'white':'#FFFFFF'
    };

    const formats = {
      'bold':'font-weight:bold;', 'b':'font-weight:bold;',
      'italic':'font-style:italic;', 'i':'font-style:italic;',
      'underlined':'text-decoration:underline;', 'u':'text-decoration:underline;',
      'strikethrough':'text-decoration:line-through;', 'st':'text-decoration:line-through;'
    };

    // Math for interpolating two hex colors
    function lerpColor(color1, color2, factor) {
      if (factor < 0) factor = 0;
      if (factor > 1) factor = 1;
      let c1 = parseInt(color1.substring(1), 16);
      let c2 = parseInt(color2.substring(1), 16);
      let r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
      let r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
      let r = Math.round(r1 + factor * (r2 - r1));
      let g = Math.round(g1 + factor * (g2 - g1));
      let b = Math.round(b1 + factor * (b2 - b1));
      return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
    }

    function parse(text) {
      let chars = [];
      let color = '#FFF';
      let activeFormats = new Set();
      let activeGradient = null;
      let i = 0;
      
      while (i < text.length) {
        // Tag Parsing Logic
        if (text[i] === '<') {
          let end = text.indexOf('>', i);
          if (end !== -1) {
            let tag = text.substring(i + 1, end).toLowerCase();
            let isClosing = tag.startsWith('/');
            let coreTag = isClosing ? tag.substring(1) : tag;

            if (coreTag === 'reset') {
              color = '#FFF';
              activeFormats.clear();
              activeGradient = null;
              i = end + 1; continue;
            } 
            
            // Gradient Handling
            if (coreTag.startsWith('gradient:')) {
              let parts = coreTag.split(':');
              if (parts.length >= 3) {
                // Find how many characters this gradient will apply to
                let gradientLength = 0;
                let j = end + 1;
                while (j < text.length) {
                  if (text[j] === '<') {
                    let nextEnd = text.indexOf('>', j);
                    if (nextEnd !== -1) {
                      let nextTag = text.substring(j + 1, nextEnd).toLowerCase();
                      // Stop gradient count if we hit a closing tag, a reset, or a new color
                      if (nextTag === '/gradient' || nextTag === 'reset' || colors[nextTag] || (nextTag.startsWith('#') && nextTag.length === 7)) {
                        break;
                      }
                      j = nextEnd + 1;
                      continue;
                    }
                  }
                  gradientLength++;
                  j++;
                }
                
                activeGradient = {
                  c1: parts[1].startsWith('#') ? parts[1] : colors[parts[1]] || '#FFFFFF',
                  c2: parts[2].startsWith('#') ? parts[2] : colors[parts[2]] || '#FFFFFF',
                  length: Math.max(1, gradientLength),
                  step: 0
                };
              }
              i = end + 1; continue;
            }

            if (coreTag === 'gradient' && isClosing) {
              activeGradient = null;
              i = end + 1; continue;
            }

            // Standard Colors & Formatting
            if (coreTag.startsWith('#') && coreTag.length === 7) {
              if (!isClosing) { color = coreTag; activeGradient = null; }
              i = end + 1; continue;
            } else if (colors[coreTag]) {
              if (!isClosing) { color = colors[coreTag]; activeGradient = null; }
              i = end + 1; continue;
            } else if (formats[coreTag]) {
              if (isClosing) activeFormats.delete(formats[coreTag]);
              else activeFormats.add(formats[coreTag]);
              i = end + 1; continue;
            } else if (coreTag === 'color' && isClosing) {
              color = '#FFF'; 
              activeGradient = null;
              i = end + 1; continue;
            }
          }
        }
        
        // Apply Gradient Math if active
        let appliedColor = color;
        if (activeGradient) {
          let factor = activeGradient.step / (activeGradient.length - 1 || 1);
          appliedColor = lerpColor(activeGradient.c1, activeGradient.c2, factor);
          activeGradient.step++;
        }

        let styleStr = `color: ${appliedColor}; ` + Array.from(activeFormats).join(' ');
        chars.push({ c: text[i], style: styleStr });
        i++;
      }
      return chars;
    }

    // --- Viewer Control Logic (Same as before) ---
    function updateMode() {
      if (modeSelect.value === 'instant') {
        delayContainer.style.display = 'none';
        animStyleContainer.style.display = 'none';
        playBtn.style.display = 'none';
        renderInstant();
      } else {
        delayContainer.style.display = 'inline-block';
        animStyleContainer.style.display = 'inline-block';
        playBtn.style.display = 'inline-block';
        playAnim();
      }
    }

    function handleTyping() {
      if (modeSelect.value === 'instant') renderInstant();
    }

    function renderInstant() {
      clearTimeout(timer);
      let chars = parse(input.value);
      let html = '';
      chars.forEach(obj => {
        html += `<span style="${obj.style}">${obj.c}</span>`;
      });
      output.innerHTML = html;
    }

    function playAnim() {
      clearTimeout(timer);
      output.innerHTML = '';
      if (!input.value) return;
      
      let chars = parse(input.value);
      let delay = parseInt(delayInput.value) || 20;
      let style = animStyleSelect.value;
      let i = 0;
      
      if (style === 'char') {
        function typeChar() {
          if (i < chars.length) {
            let span = document.createElement('span');
            span.style = chars[i].style;
            span.textContent = chars[i].c;
            output.appendChild(span);
            i++;
            timer = setTimeout(typeChar, delay);
          }
        }
        typeChar();
      } else if (style === 'line') {
        let lines = [];
        let currentLine = [];
        for (let j = 0; j < chars.length; j++) {
          currentLine.push(chars[j]);
          if (chars[j].c === '\n') {
            lines.push(currentLine);
            currentLine = [];
          }
        }
        if (currentLine.length > 0) lines.push(currentLine);

        function typeLine() {
          if (i < lines.length) {
            lines[i].forEach(obj => {
              let span = document.createElement('span');
              span.style = obj.style;
              span.textContent = obj.c;
              output.appendChild(span);
            });
            i++;
            timer = setTimeout(typeLine, delay);
          }
        }
        typeLine();
      }
    }

    input.value = "";
    updateMode();
  </script>
</body>
</html>
