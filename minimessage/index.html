<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: monospace;
      display: flex;
      gap: 20px;
      padding: 20px;
      margin: 0;
      height: 100vh;
      box-sizing: border-box;
    }
    textarea {
      width: 50%;
      background: #000;
      color: #aaa;
      border: 1px solid #333;
      padding: 10px;
      font-family: monospace;
      resize: none;
    }
    #viewer {
      width: 50%;
      display: flex;
      flex-direction: column;
    }
    .controls {
      background: #222;
      padding: 10px;
      border: 1px solid #333;
      margin-bottom: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, select, input {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 5px 10px;
      font-family: monospace;
    }
    button {
      cursor: pointer;
    }
    button:hover {
      background: #444;
    }
    #output {
      background: #000;
      padding: 10px;
      white-space: pre-wrap;
      border: 1px solid #333;
      flex-grow: 1;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <textarea id="input" oninput="handleTyping()"></textarea>
  
  <div id="viewer">
    <div class="controls">
      <label>Mode: 
        <select id="mode" onchange="updateMode()">
          <option value="typewriter">Typewriter</option>
          <option value="instant">Instant</option>
        </select>
      </label>

      <label id="animStyleContainer">Style: 
        <select id="animStyle">
          <option value="char">Character</option>
          <option value="line">Line</option>
        </select>
      </label>
      
      <label id="delayContainer">Delay: 
        <input type="number" id="delay" value="20" min="1" style="width: 60px;"> ms
      </label>
      
      <button id="playBtn" onclick="playAnim()">Play Animation</button>
    </div>
    <div id="output"></div>
  </div>

  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const modeSelect = document.getElementById('mode');
    const animStyleSelect = document.getElementById('animStyle');
    const animStyleContainer = document.getElementById('animStyleContainer');
    const delayContainer = document.getElementById('delayContainer');
    const delayInput = document.getElementById('delay');
    const playBtn = document.getElementById('playBtn');
    let timer;

    function parse(text) {
      let chars = [];
      let color = '#FFF';
      let i = 0;
      while (i < text.length) {
        if (text.substring(i, i+2) === '<#') {
          color = '#' + text.substring(i+2, i+8);
          i += 9;
          continue;
        }
        chars.push({ c: text[i], color: color });
        i++;
      }
      return chars;
    }

    function updateMode() {
      if (modeSelect.value === 'instant') {
        delayContainer.style.display = 'none';
        animStyleContainer.style.display = 'none';
        playBtn.style.display = 'none';
        renderInstant();
      } else {
        delayContainer.style.display = 'inline-block';
        animStyleContainer.style.display = 'inline-block';
        playBtn.style.display = 'inline-block';
        playAnim();
      }
    }

    function handleTyping() {
      if (modeSelect.value === 'instant') {
        renderInstant();
      }
    }

    function renderInstant() {
      clearTimeout(timer);
      let chars = parse(input.value);
      let html = '';
      chars.forEach(obj => {
        html += `<span style="color: ${obj.color}">${obj.c}</span>`;
      });
      output.innerHTML = html;
    }

    function playAnim() {
      clearTimeout(timer);
      output.innerHTML = '';
      if (!input.value) return;
      
      let chars = parse(input.value);
      let delay = parseInt(delayInput.value) || 20;
      let style = animStyleSelect.value;
      let i = 0;
      
      if (style === 'char') {
        function typeChar() {
          if (i < chars.length) {
            let span = document.createElement('span');
            span.style.color = chars[i].color;
            span.textContent = chars[i].c;
            output.appendChild(span);
            i++;
            timer = setTimeout(typeChar, delay);
          }
        }
        typeChar();
      } else if (style === 'line') {
        let lines = [];
        let currentLine = [];
        for (let j = 0; j < chars.length; j++) {
          currentLine.push(chars[j]);
          if (chars[j].c === '\n') {
            lines.push(currentLine);
            currentLine = [];
          }
        }
        if (currentLine.length > 0) lines.push(currentLine);

        function typeLine() {
          if (i < lines.length) {
            lines[i].forEach(obj => {
              let span = document.createElement('span');
              span.style.color = obj.color;
              span.textContent = obj.c;
              output.appendChild(span);
            });
            i++;
            timer = setTimeout(typeLine, delay);
          }
        }
        typeLine();
      }
    }

    input.value = "";
    updateMode();
  </script>
</body>
</html>
