<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boredom Slots</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      margin: 0; 
      background-color: #0f172a; /* Sleek dark slate */
      color: #f8fafc; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }
    
    /* Top Bar */
    .top-bar {
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .brand { 
      font-weight: bold; 
      font-size: 1.1rem; 
      color: #94a3b8; 
    }
    .wallet {
      display: flex;
      align-items: center;
      background: #0f172a;
      padding: 6px 6px 6px 16px;
      border-radius: 25px;
      border: 1px solid #334155;
    }
    .balance-text { 
      font-weight: bold; 
      margin-right: 12px; 
      color: #10b981; /* Clean green */
      font-size: 1.1rem;
    }
    .add-btn {
      background: #3b82f6; /* Modern blue */
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.4rem;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:active { 
      background: #2563eb; 
      transform: scale(0.95);
    }

    /* Main Content */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .cost-info { 
      margin-bottom: 20px; 
      color: #94a3b8; 
      font-size: 0.95rem; 
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .slots-box {
      display: flex;
      justify-content: space-between;
      width: 100%;
      background: #1e293b;
      padding: 25px 20px;
      border-radius: 16px;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.4);
      margin-bottom: 30px;
    }
    .slot {
      background: #f8fafc;
      width: 30%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
      color: #0f172a;
    }

    .spin-btn {
      width: 100%;
      padding: 18px;
      background: #ef4444; /* Clean red */
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
      transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
    }
    .spin-btn:active { 
      transform: translateY(3px); 
      background: #dc2626; 
      box-shadow: 0 2px 5px rgba(239, 68, 68, 0.3);
    }
    .spin-btn:disabled { 
      background: #475569; 
      box-shadow: none; 
      cursor: not-allowed; 
      transform: none; 
    }

    .message {
      height: 24px;
      margin-top: 25px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Bottom Bar */
    .bottom-bar {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      padding-bottom: 30px; /* Safe area for mobile navigation */
    }
    .mode-select {
      width: 100%;
      padding: 16px;
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #334155;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      outline: none;
      appearance: none;
      /* Custom dropdown arrow to match dark mode */
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 16px top 50%;
      background-size: 12px auto;
      cursor: pointer;
    }
    .mode-select:focus {
      border-color: #3b82f6;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="brand">BOREDOM SLOTS</div>
    <div class="wallet">
      <span class="balance-text" id="balance">$160</span>
      <button class="add-btn" onclick="setBalance()">+</button>
    </div>
  </div>

  <div class="main-container">
    <div class="cost-info">Cost per Spin: $10</div>

    <div class="slots-box">
      <div class="slot" id="slot1">🍋</div>
      <div class="slot" id="slot2">⭐</div>
      <div class="slot" id="slot3">⭐</div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
    <div class="message" id="message">READY TO PLAY</div>
  </div>

  <div class="bottom-bar">
    <select class="mode-select" id="modeSelect" onchange="changeMode()">
      <option value="classic">Mode: Classic 7s</option>
      <option value="gens">Mode: OpenGens Spin</option>
      <option value="cyber">Mode: Cyber Grind</option>
      <option value="monke">Mode: Primal Monke</option>
      <option value="geode">Mode: Geode Smash</option>
    </select>
  </div>

  <script>
    let balance = 160;
    const cost = 10;
    
    // Different symbol sets for the modes in the dropdown
    const modeData = {
      classic: ['🍒', '🍋', '🍉', '⭐', '💎', '7️⃣'],
      gens:    ['⛏️', '🌲', '🗡️', '🛡️', '🍎', '👑'],
      cyber:   ['🔫', '🪙', '💀', '🩸', '⚙️', '🔥'],
      monke:   ['🦍', '🍌', '🌳', '🥥', '🪨', '👑'],
      geode:   ['⛏️', '🪨', '✨', '💎', '🪙', '🌋']
    };

    let currentSymbols = modeData.classic;

    const winChart = {
      '3_match': 100, 
      '2_match': 20,  
      'jackpot': 500  
    };

    const balanceEl = document.getElementById('balance');
    const messageEl = document.getElementById('message');
    const spinBtn = document.getElementById('spinBtn');
    const modeSelect = document.getElementById('modeSelect');
    const slots = [
      document.getElementById('slot1'), 
      document.getElementById('slot2'), 
      document.getElementById('slot3')
    ];

    // Handle the custom balance + button
    function setBalance() {
      const input = prompt("Set your custom balance:", balance);
      if (input !== null && input.trim() !== "") {
        const parsed = parseFloat(input);
        if (!isNaN(parsed) && parsed >= 0) {
          balance = parsed;
          updateDisplay();
          messageEl.textContent = "BALANCE UPDATED";
          messageEl.style.color = "#10b981";
          spinBtn.disabled = balance < cost;
        } else {
          alert("Please enter a valid number.");
        }
      }
    }

    function updateDisplay() {
      balanceEl.textContent = `$${balance}`;
    }

    function changeMode() {
      const selected = modeSelect.value;
      currentSymbols = modeData[selected];
      
      // Update slots to show the new mode's symbols immediately
      slots.forEach(slot => {
        slot.textContent = currentSymbols[Math.floor(Math.random() * currentSymbols.length)];
      });
      messageEl.textContent = "MODE CHANGED";
      messageEl.style.color = "#94a3b8";
    }

    function spin() {
      if (balance < cost) {
        messageEl.textContent = "BROKE! CLICK '+' TO ADD FUNDS";
        messageEl.style.color = "#ef4444";
        spinBtn.disabled = true;
        return;
      }

      balance -= cost;
      updateDisplay();
      messageEl.textContent = "SPINNING...";
      messageEl.style.color = "#eab308"; // Yellow
      spinBtn.disabled = true;

      let spins = 0;
      const spinInterval = setInterval(() => {
        slots.forEach(slot => {
          slot.textContent = currentSymbols[Math.floor(Math.random() * currentSymbols.length)];
        });
        spins++;
        
        if (spins >= 15) {
          clearInterval(spinInterval);
          checkWin();
          if (balance >= cost) spinBtn.disabled = false;
        }
      }, 70); // Slightly faster spin animation
    }

    function checkWin() {
      const s1 = slots[0].textContent;
      const s2 = slots[1].textContent;
      const s3 = slots[2].textContent;

      let won = 0;

      if (s1 === s2 && s2 === s3) {
        // Checking for the "Jackpot" symbol in the current mode (the last item in the array)
        if (s1 === currentSymbols[currentSymbols.length - 1]) {
          won = winChart.jackpot;
          messageEl.textContent = `MEGA JACKPOT! +$${won}`;
          messageEl.style.color = "#10b981";
        } else {
          won = winChart['3_match'];
          messageEl.textContent = `TRIPLE! +$${won}`;
          messageEl.style.color = "#10b981";
        }
      } else if (s1 === s2 || s2 === s3 || s1 === s3) {
        won = winChart['2_match'];
        messageEl.textContent = `PAIR! +$${won}`;
        messageEl.style.color = "#38bdf8";
      } else {
        messageEl.textContent = "NOTHING. TRY AGAIN.";
        messageEl.style.color = "#94a3b8";
      }

      balance += won;
      updateDisplay();
      
      if (balance < cost) {
         spinBtn.disabled = true;
         messageEl.textContent = "BANKRUPT! CLICK '+' TO ADD FUNDS";
         messageEl.style.color = "#ef4444";
      }
    }
  </script>

</body>
</html>
