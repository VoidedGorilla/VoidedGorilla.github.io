<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boredom Slots</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      background-color: #1a1a2e; 
      color: #eaeaea; 
      touch-action: manipulation; /* Prevents double-tap zoom on mobile */
    }
    .container { 
      text-align: center; 
      background: #16213e; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 8px 15px rgba(0,0,0,0.6); 
      width: 90%; 
      max-width: 400px; 
    }
    h2 { margin-top: 0; color: #e94560; }
    .stats { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 20px; 
      font-size: 1.2rem; 
      font-weight: bold;
    }
    .slots { 
      display: flex; 
      justify-content: space-between; 
      font-size: 3.5rem; 
      background: #0f3460; 
      border-radius: 8px; 
      padding: 15px 10px; 
      margin: 20px 0; 
      border: 3px solid #e94560;
    }
    .slot { 
      width: 30%; 
      text-align: center; 
      background: #fff;
      border-radius: 5px;
      padding: 10px 0;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }
    button { 
      background: #e94560; 
      border: none; 
      color: white; 
      padding: 15px 0; 
      font-size: 1.5rem; 
      font-weight: bold; 
      border-radius: 8px; 
      width: 100%; 
      cursor: pointer; 
      transition: background 0.2s;
    }
    button:active { background: #b02a42; transform: translateY(2px); }
    button:disabled { background: #555; color: #888; cursor: not-allowed; transform: none; }
    #message { 
      height: 1.5em; 
      font-weight: bold; 
      margin-top: 15px; 
      font-size: 1.1rem;
      color: #4cd137;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Boredom Slots</h2>
    <div class="stats">
      <span>Balance: $<span id="balance">200</span></span>
      <span>Cost: $10</span>
    </div>

    <div class="slots">
      <div class="slot" id="slot1">🍒</div>
      <div class="slot" id="slot2">🍒</div>
      <div class="slot" id="slot3">🍒</div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN</button>
    <div id="message">Ready to play!</div>
  </div>

  <script>
    let balance = 200;
    const cost = 10;
    const symbols = ['🍒', '🍋', '🍉', '⭐', '💎', '7️⃣'];
    
    // Win multipliers
    const winChart = {
      '3_match': 100, // 3 of a kind
      '2_match': 20,  // 2 of a kind
      'jackpot': 500  // 3 sevens
    };

    const balanceEl = document.getElementById('balance');
    const messageEl = document.getElementById('message');
    const spinBtn = document.getElementById('spinBtn');
    const slots = [
      document.getElementById('slot1'), 
      document.getElementById('slot2'), 
      document.getElementById('slot3')
    ];

    function spin() {
      if (balance < cost) {
        messageEl.textContent = "Broke! Refresh to reset.";
        messageEl.style.color = "#e84118";
        spinBtn.disabled = true;
        return;
      }

      // Deduct cost and update UI
      balance -= cost;
      balanceEl.textContent = balance;
      messageEl.textContent = "Spinning...";
      messageEl.style.color = "#fbc531";
      spinBtn.disabled = true;

      let spins = 0;
      // Visual spinning effect
      const spinInterval = setInterval(() => {
        slots.forEach(slot => {
          slot.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        });
        spins++;
        
        // Stop spinning after 12 iterations
        if (spins >= 12) {
          clearInterval(spinInterval);
          checkWin();
          spinBtn.disabled = false;
        }
      }, 80);
    }

    function checkWin() {
      const s1 = slots[0].textContent;
      const s2 = slots[1].textContent;
      const s3 = slots[2].textContent;

      let won = 0;

      if (s1 === s2 && s2 === s3) {
        if (s1 === '7️⃣') {
          won = winChart.jackpot;
          messageEl.textContent = `MEGA JACKPOT! +$${won}`;
          messageEl.style.color = "#4cd137";
        } else {
          won = winChart['3_match'];
          messageEl.textContent = `TRIPLE! +$${won}`;
          messageEl.style.color = "#4cd137";
        }
      } else if (s1 === s2 || s2 === s3 || s1 === s3) {
        won = winChart['2_match'];
        messageEl.textContent = `PAIR! +$${won}`;
        messageEl.style.color = "#00a8ff";
      } else {
        messageEl.textContent = "Nothing. Try again.";
        messageEl.style.color = "#eaeaec";
      }

      balance += won;
      balanceEl.textContent = balance;
      
      if (balance < cost) {
         spinBtn.disabled = true;
         messageEl.textContent = "Bankrupt! Refresh page.";
         messageEl.style.color = "#e84118";
      }
    }
  </script>

</body>
</html>
